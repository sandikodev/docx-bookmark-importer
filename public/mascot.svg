<svg width="400" height="400" viewBox="0 0 400 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Byte-Bot Body (Floating Drone) -->
  <defs>
    <filter id="glow" x="0" y="0" width="400" height="400" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="15" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <circle cx="200" cy="180" r="100" fill="#1E293B" fill-opacity="0.9"/>
  <circle cx="200" cy="180" r="90" stroke="url(#bot_grad)" stroke-width="2"/>
  
  <!-- Robot Face (Glassmorphism Effect) -->
  <rect x="130" y="140" width="140" height="80" rx="40" fill="url(#face_grad)" fill-opacity="0.2"/>
  <rect x="131" y="141" width="138" height="78" rx="39" stroke="white" stroke-opacity="0.1"/>
  
  <!-- Animated Eyes -->
  <rect x="160" y="170" width="20" height="20" rx="10" fill="#38BDF8">
    <animate attributeName="height" values="20;2;20" dur="4s" repeatCount="indefinite" />
    <animate attributeName="y" values="170;179;170" dur="4s" repeatCount="indefinite" />
  </rect>
  <rect x="220" y="170" width="20" height="20" rx="10" fill="#38BDF8">
    <animate attributeName="height" values="20;2;20" dur="4s" repeatCount="indefinite" />
    <animate attributeName="y" values="170;179;170" dur="4s" repeatCount="indefinite" />
  </rect>

  <!-- Floating Rings -->
  <circle cx="200" cy="180" r="130" stroke="#38BDF8" stroke-width="1" stroke-dasharray="10 20">
    <animateTransform attributeName="transform" type="rotate" from="0 200 180" to="360 200 180" dur="10s" repeatCount="indefinite" />
  </circle>

  <linearGradient id="bot_grad" x1="100" y1="80" x2="300" y2="280" gradientUnits="userSpaceOnUse">
    <stop stop-color="#3B82F6"/>
    <stop offset="1" stop-color="#1E293B"/>
  </linearGradient>
  <linearGradient id="face_grad" x1="130" y1="140" x2="270" y2="220" gradientUnits="userSpaceOnUse">
    <stop stop-color="white" stop-opacity="0.1"/>
    <stop offset="1" stop-color="white" stop-opacity="0.05"/>
  </linearGradient>
</svg>
